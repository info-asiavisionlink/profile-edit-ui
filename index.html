<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>プロフィール編集</title>
  <style>
    :root {
      --bg-a: #f4f7ff;
      --bg-b: #f8f4ff;
      --bg-c: #eef7ff;
      --card-bg: rgba(255, 255, 255, 0.88);
      --text: #0f172a;
      --muted: #475569;
      --border: rgba(15, 23, 42, 0.12);
      --focus: #4f46e5;
      --danger: #dc2626;
      --success: #059669;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background:
        radial-gradient(1200px 600px at -10% -20%, rgba(79, 70, 229, 0.12), transparent 50%),
        radial-gradient(1000px 500px at 110% 0%, rgba(6, 182, 212, 0.1), transparent 50%),
        linear-gradient(140deg, var(--bg-a), var(--bg-b) 45%, var(--bg-c));
    }

    body.loading-lock {
      overflow: hidden;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 16px calc(96px + env(safe-area-inset-bottom));
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 500ms ease forwards;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
    }

    h1 {
      margin: 0;
      font-size: 1.42rem;
      letter-spacing: 0.01em;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.5;
    }

    form {
      padding: 18px 20px 20px;
    }

    .section {
      margin: 0 0 18px;
      padding: 0;
      border: 0;
    }

    .section-title {
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #334155;
      text-transform: uppercase;
      margin: 2px 0 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    label {
      font-size: 0.9rem;
      color: #334155;
      font-weight: 600;
    }

    .required {
      color: var(--danger);
      margin-left: 4px;
      font-size: 0.85em;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 1rem;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
      outline: none;
    }

    input::placeholder, textarea::placeholder {
      color: #94a3b8;
    }

    textarea {
      min-height: 104px;
      resize: vertical;
      line-height: 1.55;
    }

    input:focus, textarea:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
      transform: translateY(-1px);
    }

    textarea[disabled] {
      background: #f8fafc;
      color: #475569;
      cursor: not-allowed;
    }

    .message {
      margin: 8px 20px 0;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.45;
      display: none;
    }

    .message.show {
      display: block;
      animation: fadeIn 220ms ease;
    }

    .message.error {
      background: rgba(220, 38, 38, 0.08);
      color: #991b1b;
      border: 1px solid rgba(220, 38, 38, 0.2);
    }

    .message.success {
      background: rgba(5, 150, 105, 0.1);
      color: #065f46;
      border: 1px solid rgba(5, 150, 105, 0.22);
    }

    .save-wrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(244, 247, 255, 0.96), rgba(244, 247, 255, 0.7), transparent);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .save-btn {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0 auto;
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #fff;
      background: linear-gradient(135deg, #111827, #1f2937);
      box-shadow: 0 8px 20px rgba(17, 24, 39, 0.25);
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
    }

    .save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.3);
    }

    .save-btn:active {
      transform: translateY(0);
    }

    .save-btn:disabled {
      cursor: not-allowed;
      opacity: 0.72;
      box-shadow: none;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.42);
      border-top-color: #ffffff;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .save-btn.loading .spinner {
      display: inline-block;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.22);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 100;
    }

    .overlay.show {
      display: flex;
      animation: fadeIn 180ms ease;
    }

    .overlay-card {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      color: #1f2937;
    }

    .overlay-spinner {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid rgba(79, 70, 229, 0.28);
      border-top-color: #4f46e5;
      animation: spin 0.7s linear infinite;
    }

    @media (min-width: 768px) {
      .card-header {
        padding: 26px 28px 16px;
      }

      form {
        padding: 20px 28px 24px;
      }

      .message {
        margin: 8px 28px 0;
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="loading-lock">
  <main class="page">
    <section class="card" aria-label="プロフィール編集フォーム">
      <header class="card-header">
        <h1>プロフィール編集</h1>
        <p class="subtitle">必要な情報を入力して保存してください。</p>
      </header>

      <div id="errorMessage" class="message error" role="alert"></div>
      <div id="successMessage" class="message success" role="status"></div>

      <form id="profileForm" novalidate>
        <fieldset class="section">
          <legend class="section-title">Basic</legend>
          <div class="field">
            <label for="name">名前<span class="required">*</span></label>
            <input id="name" name="name" type="text" placeholder="山田 太郎" autocomplete="name" />
          </div>
          <div class="field">
            <label for="company_name_input">会社名</label>
            <input id="company_name_input" name="company_name_input" type="text" placeholder="株式会社サンプル" />
          </div>
          <div class="field">
            <label for="job_title">役職・職種</label>
            <input id="job_title" name="job_title" type="text" placeholder="プロダクトマネージャー" />
          </div>
        </fieldset>

        <fieldset class="section">
          <legend class="section-title">Audience</legend>
          <div class="field">
            <label for="target_people">ターゲット</label>
            <textarea id="target_people" name="target_people" placeholder="話したい相手、つながりたい相手"></textarea>
          </div>
          <div class="field">
            <label for="ng_people">NGな相手</label>
            <textarea id="ng_people" name="ng_people" placeholder="避けたい相手や条件"></textarea>
          </div>
        </fieldset>

        <fieldset class="section">
          <legend class="section-title">Personality</legend>
          <div class="field">
            <label for="hobby">趣味</label>
            <textarea id="hobby" name="hobby" placeholder="休日の過ごし方、好きなこと"></textarea>
          </div>
          <div class="field">
            <label for="self_pr">自己PR</label>
            <textarea id="self_pr" name="self_pr" placeholder="あなたらしさが伝わる自己紹介"></textarea>
          </div>
          <div class="field">
            <label for="tags">タグ</label>
            <input id="tags" name="tags" type="text" placeholder="例: SaaS,営業,スタートアップ" />
          </div>
          <div class="field">
            <label for="ai_summary">AI要約（読み取り専用）</label>
            <textarea id="ai_summary" name="ai_summary" disabled></textarea>
          </div>
        </fieldset>
      </form>
    </section>
  </main>

  <div id="loadingOverlay" class="overlay show" aria-live="polite" aria-busy="true">
    <div class="overlay-card">
      <span class="overlay-spinner" aria-hidden="true"></span>
      <span id="loadingText">読み込み中...</span>
    </div>
  </div>

  <div class="save-wrap">
    <button id="saveButton" class="save-btn" type="button">
      <span class="spinner" aria-hidden="true"></span>
      <span id="saveButtonText">保存する</span>
    </button>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      "use strict";

      const FETCH_ENDPOINT = "https://nextasia.app.n8n.cloud/webhook/afcf2cf6-974d-455c-ac5e-ccec5f30703b";
      const SAVE_ENDPOINT = "https://nextasia.app.n8n.cloud/webhook/d64f9ddc-13c6-4d3b-9813-3de5b987ac0b";

      const ids = [
        "name",
        "company_name_input",
        "job_title",
        "target_people",
        "ng_people",
        "hobby",
        "self_pr",
        "ai_summary",
        "tags"
      ];

      const saveButton = document.getElementById("saveButton");
      const saveButtonText = document.getElementById("saveButtonText");
      const loadingOverlay = document.getElementById("loadingOverlay");
      const loadingText = document.getElementById("loadingText");
      const successMessage = document.getElementById("successMessage");
      const errorMessage = document.getElementById("errorMessage");

      function setLoading(isLoading, text) {
        if (loadingText) {
          loadingText.textContent = text || "Loading...";
        }
        if (loadingOverlay) {
          loadingOverlay.classList.toggle("show", isLoading);
        }
        document.body.classList.toggle("loading-lock", isLoading);
      }

      function getLineId() {
        const params = new URLSearchParams(window.location.search);
        return (params.get("line_id") || "").trim();
      }

      function normalizeData(raw) {
        if (Array.isArray(raw)) return raw[0] || {};
        if (raw && typeof raw === "object") {
          if (raw.data && typeof raw.data === "object") {
            return Array.isArray(raw.data) ? (raw.data[0] || {}) : raw.data;
          }
          if (raw.result && typeof raw.result === "object") {
            return Array.isArray(raw.result) ? (raw.result[0] || {}) : raw.result;
          }
          return raw;
        }
        return {};
      }

      function setFieldValues(data) {
        ids.forEach(function (id) {
          const el = document.getElementById(id);
          if (!el) return;
          el.value = data[id] == null ? "" : String(data[id]);
        });
      }

      function getFieldValues(lineId) {
        const payload = { line_id: lineId };
        ids.forEach(function (id) {
          const el = document.getElementById(id);
          payload[id] = el ? el.value : "";
        });
        return payload;
      }

      function buildQuery(params) {
        return Object.keys(params)
          .map(function (key) {
            return key + "=" + encodeURIComponent(params[key] == null ? "" : String(params[key]));
          })
          .join("&");
      }

      async function fetchProfile(lineId) {
        setLoading(true, "Loading...");
        try {
          const url = FETCH_ENDPOINT + "?line_id=" + encodeURIComponent(lineId);
          const response = await fetch(url, { method: "GET" });
          if (!response.ok) throw new Error("HTTP " + response.status);

          const json = await response.json();
          console.log("Profile response:", json);
          setFieldValues(normalizeData(json));
        } catch (error) {
          alert("データ取得失敗");
        } finally {
          setLoading(false);
        }
      }

      async function submitProfile(lineId) {
        if (successMessage) successMessage.classList.remove("show");
        if (errorMessage) errorMessage.classList.remove("show");

        const payload = getFieldValues(lineId);
        const url = SAVE_ENDPOINT + "?" + buildQuery(payload);

        if (saveButton) saveButton.disabled = true;
        if (saveButtonText) saveButtonText.textContent = "送信中...";

        try {
          const response = await fetch(url, { method: "GET" });
          if (!response.ok) throw new Error("HTTP " + response.status);

          if (successMessage) {
            successMessage.textContent = "保存が完了しました";
            successMessage.classList.add("show");
          }
        } catch (error) {
          alert("保存失敗");
        } finally {
          if (saveButton) saveButton.disabled = false;
          if (saveButtonText) saveButtonText.textContent = "保存する";
        }
      }

      const lineId = getLineId();
      if (!lineId) {
        alert("line_id がありません");
        setLoading(false);
        return;
      }

      fetchProfile(lineId);

      if (saveButton) {
        saveButton.addEventListener("click", function () {
          submitProfile(lineId);
        });
      }
    });
  </script>
</body>
</html>
