<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>プロフィール編集</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>プロフィール編集</h1>
      <p class="subtitle">内容を編集して保存してください。</p>
      <p id="statusText" class="status"></p>

      <div class="section-title">基本情報</div>
      <div class="field">
        <label for="name">氏名</label>
        <input id="name" type="text" autocomplete="name" />
      </div>
      <div class="field">
        <label for="company_name_input">会社名</label>
        <input id="company_name_input" type="text" />
      </div>
      <div class="field">
        <label for="job_title">ご職業</label>
        <input id="job_title" type="text" />
      </div>

      <div class="section-title">交流情報</div>
      <div class="field">
        <label for="target_people">どんな協力者を求めていますか？</label>
        <textarea id="target_people"></textarea>
      </div>
      <div class="field">
        <label for="ng_people">どんな協力を求めていませんか？</label>
        <textarea id="ng_people"></textarea>
      </div>
      <div class="field">
        <label for="hobby">得意なこと・提供できる価値</label>
        <textarea id="hobby"></textarea>
      </div>
      <div class="field">
        <label for="self_pr">自己PR</label>
        <textarea id="self_pr"></textarea>
      </div>
      <div class="field">
        <label for="profile_url">プロフィールURL</label>
        <input id="profile_url" type="url" />
      </div>

      <div class="section-title">設定</div>
      <div class="field">
        <label for="line_opt_in">情報発信の希望</label>
        <select id="line_opt_in">
          <option value="">選択してください</option>
          <option value="希望する">希望する</option>
          <option value="希望しない">希望しない</option>
        </select>
      </div>

      <div class="section-title">AI情報</div>
      <div class="field">
        <label for="ai_summary">AI分析</label>
        <textarea id="ai_summary"></textarea>
      </div>
      <div class="field">
        <label for="tags">タグ</label>
        <input id="tags" type="text" />
      </div>

      <button id="saveButton" type="button" class="save-button">保存する</button>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
